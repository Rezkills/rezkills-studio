<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezkills Studio</title>
    <style>
        /* Base Premium Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Liquid Light Background Backdrops */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff);
            filter: blur(120px);
            opacity: 0.4;
            z-index: 1;
            animation: liquidFloat 12s infinite alternate ease-in-out;
        }

        body::before {
            top: 10%;
            left: 10%;
        }

        body::after {
            bottom: 10%;
            right: 10%;
            animation-delay: -6s;
        }

        /* Smooth Floating Animation for Lights */
        @keyframes liquidFloat {
            0% { transform: translate(0, 0) scale(1); rotate: 0deg; }
            50% { transform: translate(50px, 30px) scale(1.2); rotate: 180deg; }
            100% { transform: translate(-20px, 60px) scale(0.9); rotate: 360deg; }
        }

        /* Glassmorphism Studio Main Card Container */
        .studio-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 90%;
            width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInContainer 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInContainer {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Smooth Glowing Logo Title */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 1rem;
            color: #86868b;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        /* Premium Launcher Countdown Area */
        .countdown-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2.5rem;
        }

        .countdown-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .date-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Smooth Animated Action Buttons */
        .cta-button {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 14px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .cta-button:hover {
            background: transparent;
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }

        .secondary-link {
            display: inline-block;
            margin-top: 1.2rem;
            color: #86868b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .secondary-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="studio-container">
        <h1>rezkills-studio</h1>
        <p class="subtitle">Next generation software & applications</p>

        <div class="countdown-box">
            <div class="countdown-title">Next Big Drop</div>
            <div class="date-text">July 29 @ 11:59 PM</div>
        </div>

        <a href="https://rezkills.github.io/yappwire-website/" class="cta-button">Explore Yappwire</a>
        
        <br>
        <a href="#" class="secondary-link">Learn More &rarr;</a>
    </div>

</body>
</html>
