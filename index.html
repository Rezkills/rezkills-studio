<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Rezkills Studio | Official Hub</title>
    <meta name="description" content="Welcome to the official hub of Rezkills Studio, creating secure and innovative digital applications.">
    <meta name="author" content="Rezkills Studio">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Rezkills Studio",
      "url": "https://rezkills.github.io/rezkills-studio/"
    }
    </script>

    <style>
        /* Modern Dark Tech Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
            border-bottom: 2px solid #45f3ff;
        }
        header h1 {
            font-size: 3rem;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }
        header p {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #45f3ff;
        }
        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }
        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Projects Grid Showcase */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            justify-content: center;
        }
        .project-card {
            background-color: #1f2833;
            border: 1px solid #2f3b4c;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-5px);
            border-color: #45f3ff;
        }
        .project-info {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .project-info h3 {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }
        .project-info p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #c5c6c7;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .launch-btn {
            display: inline-block;
            text-align: center;
            background-color: #45f3ff;
            color: #0b0c10;
            padding: 12px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }
        .launch-btn:hover {
            background-color: #33b8c2;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #0b0c10;
            border-top: 1px solid #1f2833;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>REZKILLS STUDIO</h1>
        <p>Next-Generation Digital Experiences</p>
    </header>

    <main>
        <h2 class="section-title">Our Applications</h2>
        
        <div class="projects-grid">
            <div class="project-card">
                <div class="project-info">
                    <h3>Yappwire</h3>
                    <p>A secure, real-time messaging application featuring advanced cloud architecture. Built for lightning-fast and confidential communication.</p>
                    <a href="https://rezkills.github.io/Yappwire/" class="launch-btn" target="_blank">Launch App</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Rezkills Studio. All rights reserved. Private Developer Hub.
    </footer>

</body>
</html>
